name: 文档构建与测试

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/docs-build-test.yml'

permissions:
  contents: read

jobs:
  docs-check:
    name: 校验并构建文档
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 运行侧边栏验证
        run: node scripts/validate-sidebar.js

      - name: 运行图片路径验证
        run: node scripts/validate-images.js

      - name: 构建文档
        run: npm run docs:build
